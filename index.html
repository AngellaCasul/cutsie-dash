<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lane Dash</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1035;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.04em;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="hint">↑ ↓ / W S to switch lanes &nbsp;|&nbsp; P or ESC to pause &nbsp;|&nbsp; M to mute &nbsp;|&nbsp; space to start</div>

  <script>
    // ─── Canvas Setup ──────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const W = 720, H = 420;

    function resize() {
      const cssScale = Math.min(window.innerWidth / W, window.innerHeight / H);
      const dpr      = window.devicePixelRatio || 1;
      const dW       = Math.floor(W * cssScale);
      const dH       = Math.floor(H * cssScale);
      canvas.style.width  = dW + 'px';
      canvas.style.height = dH + 'px';
      canvas.width  = dW * dpr;
      canvas.height = dH * dpr;
      ctx.setTransform((dW / W) * dpr, 0, 0, (dH / H) * dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ─── Constants ─────────────────────────────────────────────────
    const LANE_Y      = [118, 224, 330];
    const PLAYER_X    = 110;
    const PLAYER_SIZE = 34;
    const STATE = { MENU:'menu', PLAYING:'playing', PAUSED:'paused', GAMEOVER:'gameover' };

    const C = {
      sky1:'#C8C2F0', sky2:'#E8E4FF',
      lane:['rgba(200,195,255,0.18)','rgba(185,178,255,0.12)','rgba(200,195,255,0.18)'],
      divider:'rgba(180,170,255,0.35)',
      ground:'#B2AADE', groundTop:'#C8C2FF',
      cloud:'rgba(255,255,255,0.72)',
      player:'#FF9DC8', playerEye:'#fff', playerPup:'#2d2040', playerChk:'rgba(255,100,140,0.45)',
      card:'rgba(255,255,255,0.93)', accent:'#8C78FF', text:'#3a2f6e', sub:'#8880b8', score:'#6455c8',
      obs:['#FF7BAC','#FF9F6B','#A78BFA','#6BD4FF','#72EFC1'],
    };
    const COIN_R = 11;

    // ─── Flip System ───────────────────────────────────────────────
    let flipState    = 'none'; // 'none' | 'warning' | 'animating' | 'active' | 'unflipping'
    let flipTimer    = 0;
    let flipProgress = 0;      // 0 = normal, 1 = fully mirrored
    let nextFlipIdx  = 0;
    const FLIP_THRESHOLDS   = [5.0, 8.0, 11.0];
    const FLIP_WARN_FRAMES  = 600;   // 10s warning
    const FLIP_ANIM_FRAMES  = 50;    // ~0.8s flip animation
    const FLIP_ACTIVE_FRAMES = 900;  // 15s stay mirrored

    // ─── Audio System ──────────────────────────────────────────────
    const SFX = (() => {
      let actx = null, masterGain = null, musicGain = null, muted = false;
      let musicPlaying = false, scheduleTimeout = null;
      let schedTime = 0, melodyIdx = 0;

      function initCtx() {
        if (!actx) {
          actx = new (window.AudioContext || window.webkitAudioContext)();
          masterGain = actx.createGain();
          masterGain.gain.value = muted ? 0 : 1;
          masterGain.connect(actx.destination);
          musicGain = actx.createGain();
          musicGain.gain.value = 0.55;
          musicGain.connect(masterGain);
        }
        if (actx.state === 'suspended') actx.resume();
        return actx;
      }

      function tone(freq, start, dur, type='square', vol=0.2, dest=null) {
        if (!actx) return;
        const osc = actx.createOscillator();
        const g   = actx.createGain();
        osc.type  = type;
        osc.frequency.setValueAtTime(freq, start);
        g.gain.setValueAtTime(vol, start);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
        osc.connect(g); g.connect(dest || masterGain);
        osc.start(start); osc.stop(start + dur + 0.02);
      }

      function noise(start, dur, vol=0.08, dest=null) {
        if (!actx) return;
        const buf  = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src  = actx.createBufferSource();
        src.buffer = buf;
        const g    = actx.createGain();
        const filt = actx.createBiquadFilter();
        filt.type  = 'bandpass'; filt.frequency.value = 1800; filt.Q.value = 0.6;
        src.connect(filt); filt.connect(g);
        g.gain.setValueAtTime(vol, start);
        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
        g.connect(dest || masterGain);
        src.start(start); src.stop(start + dur + 0.02);
      }

      function laneSwitch() {
        initCtx(); const t = actx.currentTime;
        tone(660, t, 0.07, 'sine', 0.13);
        tone(900, t + 0.06, 0.07, 'sine', 0.13);
      }
      function dodge() {
        initCtx(); const t = actx.currentTime;
        noise(t, 0.12, 0.05); tone(220, t, 0.10, 'sine', 0.04);
      }
      function collectCoin() {
        initCtx(); const t = actx.currentTime;
        tone(1047, t,        0.07, 'sine', 0.18);
        tone(1319, t + 0.07, 0.07, 'sine', 0.16);
        tone(1568, t + 0.14, 0.09, 'sine', 0.14);
      }
      function gameStart() {
        initCtx(); const t = actx.currentTime;
        [330, 415, 523, 659].forEach((f, i) => tone(f, t + i * 0.09, 0.14, 'square', 0.15));
      }
      function gameOver() {
        initCtx(); const t = actx.currentTime;
        tone(440, t,        0.15, 'sawtooth', 0.22);
        tone(330, t + 0.16, 0.15, 'sawtooth', 0.22);
        tone(220, t + 0.32, 0.15, 'sawtooth', 0.22);
        tone(165, t + 0.48, 0.45, 'sawtooth', 0.28);
        noise(t + 0.48, 0.3, 0.10);
      }
      function milestone() {
        initCtx(); const t = actx.currentTime;
        tone(880,  t,       0.07, 'sine', 0.12);
        tone(1100, t + 0.08, 0.07, 'sine', 0.12);
      }
      function newHighScore() {
        initCtx(); const t = actx.currentTime;
        [523, 659, 784, 880, 1047].forEach((f, i) => tone(f, t + i * 0.09, 0.16, 'square', 0.16));
      }

      const BPM = 138, EIGHTH = (60 / BPM) / 2;
      const F = {
        C3:130.81, F3:174.61, G3:196.00, A3:220.00,
        C4:261.63, D4:293.66, E4:329.63, G4:392.00,
        C5:523.25, D5:587.33, E5:659.25, G5:783.99, A5:880.00,
      };
      const MELODY = [
        F.C5,0,F.E5,0,F.G5,F.E5,F.C5,0,
        F.D5,0,F.G5,0,F.E5,0,F.D5,0,
        F.E5,0,F.G5,0,F.A5,F.G5,F.E5,0,
        F.G5,F.E5,F.D5,F.C5,F.E5,0,F.C5,0,
      ];
      const HARMONY = [
        0,F.G4,0,F.G4,0,F.G4,0,F.G4,
        0,F.A3,0,F.A3,0,F.G4,0,F.G4,
        0,F.G4,0,F.G4,0,F.G4,0,F.G4,
        0,F.G4,0,F.E4,0,F.G4,0,F.C4,
      ];
      const BASS = [
        F.C3,F.G3,F.C3,F.G3, F.F3,F.G3,F.A3,F.G3,
        F.C3,F.G3,F.C3,F.A3, F.G3,F.G3,F.C3,F.C3,
      ];

      function scheduleMusicChunk() {
        if (!actx || !musicPlaying) return;
        while (schedTime < actx.currentTime + 0.30) {
          const mi = melodyIdx % MELODY.length;
          const mf = MELODY[mi];
          if (mf > 0) tone(mf, schedTime, EIGHTH * 0.78, 'square', 0.10, musicGain);
          const hf = HARMONY[mi];
          if (hf > 0) tone(hf, schedTime, EIGHTH * 0.65, 'triangle', 0.06, musicGain);
          if (melodyIdx % 2 === 0) {
            const bf = BASS[Math.floor(melodyIdx / 2) % BASS.length];
            if (bf > 0) tone(bf, schedTime, EIGHTH * 1.7, 'triangle', 0.14, musicGain);
          }
          melodyIdx++; schedTime += EIGHTH;
        }
        scheduleTimeout = setTimeout(scheduleMusicChunk, 90);
      }

      function startMusic() {
        if (musicPlaying) return;
        initCtx(); musicPlaying = true; melodyIdx = 0;
        schedTime = actx.currentTime + 0.15;
        scheduleMusicChunk();
      }
      function stopMusic() {
        musicPlaying = false;
        if (scheduleTimeout) { clearTimeout(scheduleTimeout); scheduleTimeout = null; }
      }
      function pauseMusic()  { if (actx && actx.state === 'running')   actx.suspend(); }
      function resumeMusic() { if (actx && actx.state === 'suspended') actx.resume();  }
      function toggleMute() {
        initCtx(); muted = !muted;
        masterGain.gain.setTargetAtTime(muted ? 0 : 1, actx.currentTime, 0.05);
        return muted;
      }
      function isMuted() { return muted; }

      return { laneSwitch, dodge, collectCoin, gameStart, gameOver, milestone, newHighScore,
               startMusic, stopMusic, pauseMusic, resumeMusic, toggleMute, isMuted };
    })();

    // ─── State Variables ────────────────────────────────────────────
    let state         = STATE.MENU;
    let score         = 0;
    let highScore     = Number(localStorage.getItem('laneDash_hs')    || 0);
    let totalCoins    = Number(localStorage.getItem('laneDash_coins') || 0);
    let speed         = 1.6;
    let frameCount    = 0;
    let spawnTimer    = 0;
    let spawnGap      = 90;
    let bgOffset      = 0;
    let newRecord     = false;
    let lastMilestone = 0;

    let coins          = [];
    let coinSpawnTimer = 0;
    let coinsCollected = 0;
    const COIN_POINTS  = 10;

    let floatingTexts = [];

    // ─── Player ─────────────────────────────────────────────────────
    const player = {
      lane: 1, y: LANE_Y[1], targetY: LANE_Y[1],
      canSwitch: true, bobTimer: 0,
    };

    let obstacles = [];

    const clouds = [
      {x:80,y:38,scale:1.0},{x:280,y:22,scale:0.75},
      {x:500,y:44,scale:0.85},{x:660,y:18,scale:0.6},
    ];

    // ─── Input ──────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.code === 'KeyM') { SFX.toggleMute(); return; }

      if (e.code === 'KeyH' && state === STATE.GAMEOVER) {
        SFX.stopMusic(); state = STATE.MENU; return;
      }
      if (e.code === 'KeyQ' && state === STATE.PAUSED) {
        SFX.stopMusic(); state = STATE.MENU; return;
      }
      if ((e.code === 'KeyP' || e.code === 'Escape') && state === STATE.PLAYING) {
        SFX.pauseMusic(); state = STATE.PAUSED; return;
      }
      if ((e.code === 'KeyP' || e.code === 'Escape') && state === STATE.PAUSED) {
        SFX.resumeMusic(); state = STATE.PLAYING; return;
      }
      if (e.code === 'Space' || e.code === 'Enter') {
        if (state === STATE.PAUSED)  { SFX.resumeMusic(); state = STATE.PLAYING; return; }
        if (state !== STATE.PLAYING) { startGame(); return; }
      }
      if (state !== STATE.PLAYING || !player.canSwitch) return;

      if ((e.code === 'ArrowUp' || e.code === 'KeyW') && player.lane > 0) {
        player.lane--; player.targetY = LANE_Y[player.lane];
        player.canSwitch = false; SFX.laneSwitch();
      }
      if ((e.code === 'ArrowDown' || e.code === 'KeyS') && player.lane < 2) {
        player.lane++; player.targetY = LANE_Y[player.lane];
        player.canSwitch = false; SFX.laneSwitch();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (['ArrowUp','ArrowDown','KeyW','KeyS'].includes(e.code)) player.canSwitch = true;
    });

    canvas.addEventListener('click', (e) => {
      if (state === STATE.PAUSED) { SFX.resumeMusic(); state = STATE.PLAYING; return; }

      if (state === STATE.GAMEOVER) {
        const rect   = canvas.getBoundingClientRect();
        const gx     = (e.clientX - rect.left) * (W / rect.width);
        const gy     = (e.clientY - rect.top)  * (H / rect.height);
        const ch     = 330, cy = (H - ch) / 2 - 10;
        const btnX   = W/2 - 85, btnY = cy + 278, btnW = 170, btnH = 36;
        if (gx >= btnX && gx <= btnX + btnW && gy >= btnY && gy <= btnY + btnH) {
          SFX.stopMusic(); state = STATE.MENU; return;
        }
        startGame(); return;
      }

      if (state !== STATE.PLAYING) startGame();
    });

    let touchStartX = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX; e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      if (state !== STATE.PLAYING) { startGame(); return; }
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 25 && player.canSwitch) {
        if (diff < 0 && player.lane > 0) {
          player.lane--; player.targetY = LANE_Y[player.lane]; player.canSwitch = false; SFX.laneSwitch();
        }
        if (diff > 0 && player.lane < 2) {
          player.lane++; player.targetY = LANE_Y[player.lane]; player.canSwitch = false; SFX.laneSwitch();
        }
        setTimeout(() => { player.canSwitch = true; }, 200);
      }
      e.preventDefault();
    }, { passive: false });

    // ─── Game Functions ─────────────────────────────────────────────
    function startGame() {
      state = STATE.PLAYING; score = 0; lastMilestone = 0; speed = 1.6;
      frameCount = 0; spawnTimer = 0; spawnGap = 90;
      coinSpawnTimer = 0; coinsCollected = 0;
      newRecord = false; obstacles = []; coins = []; floatingTexts = [];
      player.lane = 1; player.y = LANE_Y[1]; player.targetY = LANE_Y[1];
      player.canSwitch = true;
      flipState = 'none'; flipTimer = 0; flipProgress = 0; nextFlipIdx = 0;
      SFX.gameStart(); SFX.startMusic();
    }

    function spawnObstacles() {
      const SAFE_BUFFER = 130;
      const blockTwo = speed > 4.5 && Math.random() < 0.40;

      if (blockTwo) {
        const safeLane = Math.floor(Math.random() * 3);
        let xOffset = 0;
        [0, 1, 2].filter(l => l !== safeLane).forEach(lane => {
          const spawnX = W + 30 + xOffset;
          const coinNearby = coins.some(c => !c.collected && c.lane === lane && Math.abs(c.x - spawnX) < SAFE_BUFFER);
          if (!coinNearby) {
            obstacles.push({
              x: spawnX, y: LANE_Y[lane], lane,
              w: 36 + Math.random() * 14,
              h: 36 + Math.random() * 14,
              color: C.obs[Math.floor(Math.random() * C.obs.length)],
              passed: false,
            });
          }
          xOffset += Math.random() * 28;
        });
      } else {
        const lane = Math.floor(Math.random() * 3);
        const spawnX = W + 30;
        const coinNearby = coins.some(c => !c.collected && c.lane === lane && Math.abs(c.x - spawnX) < SAFE_BUFFER);
        if (!coinNearby) {
          obstacles.push({
            x: spawnX, y: LANE_Y[lane], lane,
            w: 38 + Math.random() * 18,
            h: 38 + Math.random() * 18,
            color: C.obs[Math.floor(Math.random() * C.obs.length)],
            passed: false,
          });
        }
      }
    }

    function spawnCoin() {
      const lane    = Math.floor(Math.random() * 3);
      const startX  = W + 30;
      const SAFE_BUFFER = 130;
      const obstacleNearby = obstacles.some(o => o.lane === lane && Math.abs(o.x - startX) < SAFE_BUFFER);
      if (obstacleNearby) return;

      const count = Math.random() < 0.45 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        coins.push({
          x: startX + i * 36,
          y: LANE_Y[lane],
          lane,
          bob: Math.random() * Math.PI * 2,
          collected: false,
        });
      }
    }

    function checkCollision(p, o) {
      const pw = PLAYER_SIZE * 0.8, ow = o.w * 0.8, oh = o.h * 0.8;
      return (
        Math.abs(p.y - o.y)      < (pw / 2 + oh / 2) - 6 &&
        Math.abs(PLAYER_X - o.x) < (pw / 2 + ow / 2) - 8
      );
    }

    // ─── Flip Update ────────────────────────────────────────────────
    function updateFlip() {
      if (flipState === 'none' && nextFlipIdx < FLIP_THRESHOLDS.length
          && speed >= FLIP_THRESHOLDS[nextFlipIdx]) {
        nextFlipIdx++;
        flipState = 'warning';
        flipTimer = FLIP_WARN_FRAMES;
      }

      if (flipState === 'warning') {
        flipTimer--;
        if (flipTimer <= 0) { flipState = 'animating'; flipTimer = FLIP_ANIM_FRAMES; }
      }

      if (flipState === 'animating') {
        flipTimer--;
        flipProgress = 1 - flipTimer / FLIP_ANIM_FRAMES;
        if (flipTimer <= 0) { flipState = 'active'; flipTimer = FLIP_ACTIVE_FRAMES; flipProgress = 1; }
      }

      if (flipState === 'active') {
        flipTimer--;
        if (flipTimer <= 0) { flipState = 'unflipping'; flipTimer = FLIP_ANIM_FRAMES; }
      }

      if (flipState === 'unflipping') {
        flipTimer--;
        flipProgress = flipTimer / FLIP_ANIM_FRAMES;
        if (flipTimer <= 0) { flipState = 'none'; flipProgress = 0; }
      }
    }

    // ─── Drawing Helpers ────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawCloud(x, y, scale) {
      ctx.fillStyle = C.cloud;
      ctx.beginPath();
      ctx.arc(x, y, 22 * scale, 0, Math.PI * 2);
      ctx.arc(x + 26 * scale, y - 9 * scale, 17 * scale, 0, Math.PI * 2);
      ctx.arc(x + 46 * scale, y, 20 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, C.sky1); grad.addColorStop(1, C.sky2);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

      clouds.forEach(cl => {
        const cx = ((cl.x - bgOffset * 0.3 * cl.scale) % (W + 140) + W + 140) % (W + 140) - 80;
        drawCloud(cx, cl.y, cl.scale);
      });

      LANE_Y.forEach((ly, i) => { ctx.fillStyle = C.lane[i]; ctx.fillRect(0, ly - 58, W, 116); });

      ctx.setLineDash([18, 14]); ctx.strokeStyle = C.divider; ctx.lineWidth = 1.5;
      [(LANE_Y[0] + LANE_Y[1]) / 2, (LANE_Y[1] + LANE_Y[2]) / 2].forEach(dy => {
        ctx.beginPath(); ctx.moveTo(0, dy); ctx.lineTo(W, dy); ctx.stroke();
      });
      ctx.setLineDash([]);

      ctx.fillStyle = C.groundTop; ctx.fillRect(0, H - 62, W, 4);
      ctx.fillStyle = C.ground;    ctx.fillRect(0, H - 58, W, 58);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      for (let x = -(bgOffset % 72); x < W; x += 72) ctx.fillRect(x, H - 52, 36, 3);
    }

    function drawPlayer(px, py, sad = false) {
      const s   = PLAYER_SIZE;
      const bob = sad ? 0 : Math.sin(player.bobTimer * 0.08) * 2;

      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(px, py + s/2 + 5 - bob, s/2 + 2, 7, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = C.player;
      ctx.beginPath(); ctx.arc(px, py - bob, s/2, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#FFB8D8';
      ctx.beginPath();
      ctx.arc(px - s/2 + 5, py - s/2 + 4 - bob, 7, 0, Math.PI * 2);
      ctx.arc(px + s/2 - 5, py - s/2 + 4 - bob, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = C.playerChk;
      ctx.beginPath();
      ctx.arc(px - 10, py + 4 - bob, 7, 0, Math.PI * 2);
      ctx.arc(px + 10, py + 4 - bob, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = C.playerEye;
      ctx.beginPath();
      ctx.arc(px - 8, py - 5 - bob, 6, 0, Math.PI * 2);
      ctx.arc(px + 8, py - 5 - bob, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = C.playerPup;
      ctx.beginPath();
      ctx.arc(px - 7, py - 4 - bob, 3.5, 0, Math.PI * 2);
      ctx.arc(px + 9, py - 4 - bob, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = C.playerPup; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath();
      if (!sad) ctx.arc(px, py + 4 - bob, 7, 0.2, Math.PI - 0.2);
      else       ctx.arc(px, py + 13 - bob, 7, Math.PI + 0.2, -0.2);
      ctx.stroke();
    }

    function drawObstacle(o) {
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath(); ctx.ellipse(o.x, o.y + o.h/2 + 5, o.w/2 * 0.8, 6, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = o.color;
      roundRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h, 10); ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      roundRect(o.x - o.w/2 + 5, o.y - o.h/2 + 5, o.w * 0.35, o.h * 0.25, 5); ctx.fill();

      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.arc(o.x - 8, o.y - 4, 4, 0, Math.PI * 2);
      ctx.arc(o.x + 8, o.y - 4, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(o.x - 7, o.y + 7); ctx.lineTo(o.x + 7, o.y + 7); ctx.stroke();
    }

    function drawCoin(coin) {
      const t   = Date.now() / 1000;
      const bob = Math.sin(t * 3 + coin.bob) * 3;
      const cx  = coin.x;
      const cy  = coin.y + bob;

      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(cx, coin.y + COIN_R + 6, COIN_R * 0.7, 4, 0, 0, Math.PI * 2); ctx.fill();

      const grad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, COIN_R);
      grad.addColorStop(0, '#FFF176');
      grad.addColorStop(0.6, '#FFD700');
      grad.addColorStop(1, '#E6A800');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, COIN_R, 0, Math.PI * 2); ctx.fill();

      ctx.strokeStyle = '#C8900A'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, COIN_R - 1.5, 0, Math.PI * 2); ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.beginPath(); ctx.ellipse(cx - 3, cy - 4, 4, 2.5, -0.5, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#92650A';
      ctx.font = '700 10px Nunito, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✦', cx, cy + 0.5);
      ctx.textBaseline = 'alphabetic';
    }

    function drawFloatingTexts() {
      floatingTexts.forEach(ft => {
        const alpha  = ft.timer / ft.maxTimer;
        const yShift = (1 - alpha) * 28;
        ctx.globalAlpha = alpha;
        ctx.font = '800 15px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillText(ft.text, ft.x + 1, ft.y - yShift + 1);
        ctx.fillStyle = '#FFD700';
        ctx.fillText(ft.text, ft.x, ft.y - yShift);
        ctx.globalAlpha = 1;
      });
    }

    // ─── HUD ────────────────────────────────────────────────────────
    function drawScoreHUD() {
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      roundRect(14, 14, 148, 34, 17); ctx.fill();
      ctx.fillStyle = C.score; ctx.font = '600 13px Nunito, sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`Best: ${Math.floor(highScore)}`, 26, 36);

      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      roundRect(W - 196, 14, 182, 34, 17); ctx.fill();
      ctx.fillStyle = C.score; ctx.font = '600 13px Nunito, sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(`Score: ${Math.floor(score)}`, W - 24, 36);
      ctx.fillStyle = '#92650A';
      ctx.font = '700 12px Nunito, sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`✦ ${coinsCollected}`, W - 192, 36);

      const muteIcon = SFX.isMuted() ? '🔇' : '🔊';
      const lvl = Math.floor((speed - 1.6) / 1.2) + 1;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '600 11px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`Lv.${lvl}  ${muteIcon} M  |  P / ESC pause`, W / 2, 28);
    }

    // ─── Flip Warning ───────────────────────────────────────────────
    function drawFlipWarning() {
      const t         = Date.now() / 1000;
      const countdown = Math.ceil(flipTimer / 60);
      const pulse     = 0.75 + 0.25 * Math.sin(t * 8);
      const urgency   = 1 - flipTimer / FLIP_WARN_FRAMES;
      const isUrgent  = countdown <= 3;

      // Subtle flashing border — only visible in last 5 seconds
      if (urgency > 0.5) {
        ctx.save();
        ctx.globalAlpha = pulse * 0.35 * ((urgency - 0.5) * 2);
        ctx.strokeStyle = '#FF8C00';
        ctx.lineWidth   = 10;
        ctx.strokeRect(0, 0, W, H);
        ctx.restore();
      }

      // Compact top-left toast
      const bw = 210, bh = 52, bx = 14, by = 56;
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.fillStyle   = '#2d1a50';
      roundRect(bx, by, bw, bh, 12); ctx.fill();
      ctx.strokeStyle = isUrgent ? '#FF4500' : '#FF8C00';
      ctx.lineWidth   = 2 * pulse;
      roundRect(bx, by, bw, bh, 12); ctx.stroke();

      ctx.globalAlpha = 1;
      ctx.textAlign   = 'left';
      ctx.fillStyle   = isUrgent ? '#FF6060' : '#FFB347';
      ctx.font        = '800 12px Nunito, sans-serif';
      ctx.fillText('⚠️ MIRROR INCOMING', bx + 12, by + 18);

      ctx.fillStyle = '#c8c0ff';
      ctx.font      = '600 11px Nunito, sans-serif';
      ctx.fillText('Obstacles flip LEFT!', bx + 12, by + 34);

      // Big countdown on the right side of the toast
      const numPulse = 1 + (isUrgent ? 0.2 * Math.sin(t * 12) : 0);
      ctx.save();
      ctx.translate(bx + bw - 28, by + bh / 2 + 2);
      ctx.scale(numPulse, numPulse);
      ctx.textAlign   = 'center';
      ctx.fillStyle   = isUrgent ? '#FF4500' : '#FFD700';
      ctx.font        = `900 26px Nunito, sans-serif`;
      ctx.shadowColor = isUrgent ? '#FF4500' : '#FFD700';
      ctx.shadowBlur  = 10 * pulse;
      ctx.fillText(countdown, 0, 0);
      ctx.shadowBlur  = 0;
      ctx.restore();

      ctx.restore();
    }

    // ─── Screens ────────────────────────────────────────────────────
    function drawPaused() {
      drawBackground();
      coins.filter(c => !c.collected).forEach(drawCoin);
      obstacles.forEach(drawObstacle);
      drawPlayer(PLAYER_X, player.y, false); drawScoreHUD();

      ctx.fillStyle = 'rgba(40,30,100,0.55)'; ctx.fillRect(0, 0, W, H);

      const cw = 300, ch = 248, cx = (W - cw) / 2, cy = (H - ch) / 2;
      ctx.fillStyle = C.card; roundRect(cx, cy, cw, ch, 22); ctx.fill();

      ctx.fillStyle = C.accent;
      roundRect(W/2 - 22, cy + 28, 14, 36, 4); ctx.fill();
      roundRect(W/2 + 8,  cy + 28, 14, 36, 4); ctx.fill();

      ctx.fillStyle = C.text; ctx.font = '800 28px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Paused', W / 2, cy + 108);

      ctx.fillStyle = C.sub; ctx.font = '600 14px Nunito, sans-serif';
      ctx.fillText(`Score: ${Math.floor(score)}  ✦ ${coinsCollected} coins`, W / 2, cy + 134);

      ctx.fillStyle = C.accent; roundRect(W/2 - 80, cy + 150, 160, 38, 19); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = '700 14px Nunito, sans-serif';
      ctx.fillText('Resume (P / ESC)', W / 2, cy + 174);

      ctx.fillStyle = 'rgba(140,120,255,0.15)';
      roundRect(W/2 - 80, cy + 196, 160, 34, 17); ctx.fill();
      ctx.fillStyle = C.accent; ctx.font = '600 13px Nunito, sans-serif';
      ctx.fillText('Quit to Menu (Q)', W / 2, cy + 218);
    }

    function drawMenu() {
      drawBackground();
      const cw = 360, ch = 295, cx = (W - cw) / 2, cy = (H - ch) / 2 - 10;
      ctx.fillStyle = C.card; roundRect(cx, cy, cw, ch, 22); ctx.fill();

      ctx.fillStyle = C.accent; ctx.font = '800 44px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Lane Dash', W / 2, cy + 62);

      ctx.fillStyle = C.sub; ctx.font = '600 14px Nunito, sans-serif';
      ctx.fillText('Dodge blocks · Grab coins · Survive!', W / 2, cy + 90);

      drawPlayer(W / 2, cy + 152, false);

      ctx.fillStyle = C.sub; ctx.font = '600 12px Nunito, sans-serif';
      ctx.fillText('↑ ↓ or W S to switch lanes', W / 2, cy + 204);

      if (totalCoins > 0) {
        ctx.fillStyle = '#92650A'; ctx.font = '600 12px Nunito, sans-serif';
        ctx.fillText(`Total coins ever: ✦ ${totalCoins}`, W / 2, cy + 220);
      }

      ctx.fillStyle = C.accent; roundRect(W/2 - 90, cy + 234, 180, 40, 20); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = '700 15px Nunito, sans-serif';
      ctx.fillText('Press SPACE or click', W / 2, cy + 259);

      if (highScore > 0) {
        ctx.fillStyle = '#b0a8e0'; ctx.font = '600 12px Nunito, sans-serif';
        ctx.fillText(`High Score: ${Math.floor(highScore)}`, W / 2, cy + ch + 22);
      }
    }

    function drawGameOver() {
      drawBackground();
      ctx.fillStyle = 'rgba(80,60,160,0.22)'; ctx.fillRect(0, 0, W, H);

      const cw = 320, ch = 330, cx = (W - cw) / 2, cy = (H - ch) / 2 - 10;
      ctx.fillStyle = C.card; roundRect(cx, cy, cw, ch, 22); ctx.fill();

      ctx.fillStyle = '#FF6B95'; ctx.font = '800 36px Nunito, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('Game Over!', W / 2, cy + 55);

      ctx.fillStyle = C.text; ctx.font = '700 20px Nunito, sans-serif';
      ctx.fillText(`Score: ${Math.floor(score)}`, W / 2, cy + 90);

      ctx.fillStyle = '#92650A'; ctx.font = '700 14px Nunito, sans-serif';
      ctx.fillText(`✦ ${coinsCollected} coins  (+${coinsCollected * COIN_POINTS} pts)`, W / 2, cy + 116);

      if (newRecord && score > 0) {
        ctx.fillStyle = '#FF9EBC'; ctx.font = '700 14px Nunito, sans-serif';
        ctx.fillText('✦ New High Score! ✦', W / 2, cy + 140);
      } else {
        ctx.fillStyle = C.sub; ctx.font = '600 13px Nunito, sans-serif';
        ctx.fillText(`Best: ${Math.floor(highScore)}`, W / 2, cy + 140);
      }

      drawPlayer(W / 2, cy + 198, true);

      // Retry button
      ctx.fillStyle = C.accent; roundRect(W/2 - 85, cy + 232, 170, 38, 19); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = '700 14px Nunito, sans-serif';
      ctx.fillText('Press SPACE to retry', W / 2, cy + 256);

      // Home button
      ctx.fillStyle = 'rgba(140,120,255,0.18)';
      roundRect(W/2 - 85, cy + 278, 170, 36, 18); ctx.fill();
      ctx.fillStyle = C.accent; ctx.font = '700 13px Nunito, sans-serif';
      ctx.fillText('🏠 Home (H)', W / 2, cy + 301);
    }

    // ─── Update ─────────────────────────────────────────────────────
    function update() {
      if (state !== STATE.PLAYING) return;

      frameCount++;
      score     += speed * 0.045;
      bgOffset  += speed;
      player.bobTimer++;

      player.y += (player.targetY - player.y) * 0.16;

      updateFlip();

      speed    = Math.min(speed + 0.0010, 14);
      spawnGap = Math.max(30, 90 - speed * 7);

      // ── Obstacle spawning ──
      spawnTimer++;
      if (spawnTimer >= spawnGap) {
        spawnObstacles();
        spawnTimer = Math.floor(Math.random() * 10);
      }

      // ── Coin spawning ──
      const coinGap = Math.max(55, 80 - speed * 2);
      coinSpawnTimer++;
      if (coinSpawnTimer >= coinGap) {
        spawnCoin();
        coinSpawnTimer = Math.floor(Math.random() * 15);
      }

      // ── Move obstacles ──
      obstacles.forEach(o => {
        o.x -= speed;
        if (!o.passed && o.x < PLAYER_X - PLAYER_SIZE) {
          o.passed = true; SFX.dodge();
        }
      });
      obstacles = obstacles.filter(o => o.x > -80);

      // ── Move coins; collect on overlap ──
      coins.forEach(coin => {
        coin.x -= speed;
        if (!coin.collected) {
          const dx = Math.abs(coin.x - PLAYER_X);
          const dy = Math.abs(coin.y - player.y);
          if (dx < COIN_R + PLAYER_SIZE * 0.55 && dy < COIN_R + PLAYER_SIZE * 0.55) {
            coin.collected = true;
            coinsCollected++;
            score += COIN_POINTS;
            SFX.collectCoin();
            floatingTexts.push({ x: coin.x, y: coin.y, text: `+${COIN_POINTS}`, timer: 45, maxTimer: 45 });
          }
        }
      });
      coins = coins.filter(c => c.x > -40 && !c.collected);

      // ── Floating text decay ──
      floatingTexts.forEach(ft => ft.timer--);
      floatingTexts = floatingTexts.filter(ft => ft.timer > 0);

      // ── Score milestone ping every 50 pts ──
      const nextM = Math.floor(score / 50) * 50;
      if (nextM > 0 && nextM > lastMilestone) { lastMilestone = nextM; SFX.milestone(); }

      // ── Collision detection ──
      for (const o of obstacles) {
        if (checkCollision(player, o)) {
          totalCoins += coinsCollected;
          localStorage.setItem('laneDash_coins', totalCoins);
          if (score > highScore) {
            highScore = score; newRecord = true;
            localStorage.setItem('laneDash_hs', highScore);
            SFX.newHighScore();
          } else {
            SFX.gameOver();
          }
          SFX.stopMusic();
          state = STATE.GAMEOVER;
          return;
        }
      }
    }

    // ─── Draw ────────────────────────────────────────────────────────
    function draw() {
      ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore();

      if (state === STATE.MENU)     { drawMenu();     return; }
      if (state === STATE.GAMEOVER) { drawGameOver(); return; }
      if (state === STATE.PAUSED)   { drawPaused();   return; }

      // Apply horizontal mirror transform to game world only
      ctx.save();
      if (flipProgress > 0) {
        const scaleX = Math.cos(flipProgress * Math.PI); // 1 → 0 → -1
        ctx.translate(W / 2, 0);
        ctx.scale(scaleX, 1);
        ctx.translate(-W / 2, 0);
      }
      drawBackground();
      coins.filter(c => !c.collected).forEach(drawCoin);
      obstacles.forEach(drawObstacle);
      drawPlayer(PLAYER_X, player.y, false);
      drawFloatingTexts();
      ctx.restore(); // HUD always right-side up

      drawScoreHUD();

      if (flipState === 'warning') drawFlipWarning();

      // Reminder bar while mirrored
      if (flipState === 'active') {
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 300);
        ctx.save();
        ctx.globalAlpha = pulse * 0.85;
        ctx.fillStyle   = '#FF8C00';
        ctx.font        = '800 13px Nunito, sans-serif';
        ctx.textAlign   = 'center';
        ctx.fillText('🔀 MIRRORED — obstacles coming from the LEFT!', W / 2, H - 14);
        ctx.restore();
      }
    }

    // ─── Loop ────────────────────────────────────────────────────────
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
  </script>
</body>
